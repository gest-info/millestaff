<!DOCTYPE html>
<html>
<head>
  <script>
    const path = window.location.pathname.replace(/^\/[^/]*/, '');
    sessionStorage.setItem('redirect', path);
    window.location.replace(window.location.origin + window.location.pathname.split('/')[1] ? '/' + window.location.pathname.split('/')[1] : '/');
  </script>
</head>
</html>
